name: CI

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Check Python
        run: python --version
      - name: Install deps
        run: pip install pytest fastapi
      - name: Run tests
        run: pytest --help
